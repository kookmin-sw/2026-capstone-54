apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mefit-production-api-ingress
  namespace: mefit-backend-production
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: api.mefit.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mefit-production-api
                port:
                  number: 80
