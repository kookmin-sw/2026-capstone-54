apiVersion: apps/v1
kind: Deployment
metadata:
  name: mefit-production-scraper-worker
  namespace: mefit-backend-production
  labels:
    app: mefit-production-scraper-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mefit-production-scraper-worker
  template:
    metadata:
      labels:
        app: mefit-production-scraper-worker
    spec:
      nodeSelector:
        nodepool: heavy
      priorityClassName: mefit-production-standard
      imagePullSecrets:
        - name: mefit-production-dockerhub
      containers:
        - name: scraper-worker
          image: teammefit/mefit-scraper:production
          imagePullPolicy: Always
          env:
            - name: SCRAPER_CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: mefit-production-scraper-env
                  key: SCRAPER_CONCURRENCY
          envFrom:
            - configMapRef:
                name: mefit-production-scraper-env
            - secretRef:
                name: mefit-production-scraper-secret
          resources:
            requests:
              cpu: "200m"
              memory: "900Mi"
            limits:
              cpu: "1500m"
              memory: "1536Mi"
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
