apiVersion: apps/v1
kind: Deployment
metadata:
  name: mefit-production-celery-worker
  namespace: mefit-backend-production
  labels:
    app: mefit-production-celery-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mefit-production-celery-worker
  template:
    metadata:
      labels:
        app: mefit-production-celery-worker
    spec:
      imagePullSecrets:
        - name: mefit-production-dockerhub
      containers:
        - name: celery-worker
          image: teammefit/mefit-backend:production
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: mefit-production-env
            - secretRef:
                name: mefit-production-secret
          env:
            - name: DJANGO_APPLICATION_NAME
              value: "mefit-celery-worker"
          command: ["celery"]
          args: ["-A", "config", "worker", "-l", "INFO", "-E", "--concurrency", "2"]
          resources:
            requests:
              cpu: 200m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
