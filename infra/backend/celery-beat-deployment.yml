apiVersion: apps/v1
kind: Deployment
metadata:
  name: mefit-production-celery-beat
  namespace: mefit-backend-production
  labels:
    app: mefit-production-celery-beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mefit-production-celery-beat
  template:
    metadata:
      labels:
        app: mefit-production-celery-beat
    spec:
      nodeSelector:
        nodepool: heavy
      priorityClassName: mefit-production-standard
      imagePullSecrets:
        - name: mefit-production-dockerhub
      containers:
        - name: celery-beat
          image: teammefit/mefit-backend:production
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: mefit-production-env
            - secretRef:
                name: mefit-production-secret
          env:
            - name: DJANGO_APPLICATION_NAME
              value: "mefit-celery-beat"
          command: ["celery"]
          args: ["-A", "config", "beat", "-l", "INFO"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
