apiVersion: apps/v1
kind: Deployment
metadata:
  name: mefit-production-api
  namespace: mefit-backend-production
  labels:
    app: mefit-production-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: mefit-production-api
  template:
    metadata:
      labels:
        app: mefit-production-api
    spec:
      nodeSelector:
        nodepool: heavy
      priorityClassName: mefit-production-critical
      imagePullSecrets:
      - name: mefit-production-dockerhub
      containers:
      - name: django
        image: teammefit/mefit-backend:production
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: mefit-production-env
        - secretRef:
            name: mefit-production-secret
        env:
        - name: DJANGO_APPLICATION_NAME
          value: "mefit-api"
        command: [ "uvicorn" ]
        args:
        - "config.asgi:application"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
        - "--workers"
        - "2"
        readinessProbe:
          httpGet:
            path: /api/v1/health-check/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/v1/health-check/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 150m
            memory: 768Mi
          limits:
            cpu: "1.2"
            memory: 768Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mefit-production-api
  namespace: mefit-backend-production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mefit-production-api
