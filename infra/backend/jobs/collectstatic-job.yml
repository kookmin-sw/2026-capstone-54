apiVersion: batch/v1
kind: Job
metadata:
  name: mefit-production-collectstatic
  namespace: mefit-backend-production
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      hostNetwork: true  # NOTE: (신건) EC2 메타데이터 서비스 접근 허용
      imagePullSecrets:
        - name: mefit-production-dockerhub
      containers:
        - name: collectstatic
          image: teammefit/mefit-backend:production
          imagePullPolicy: Always
          command: ["python", "manage.py", "collectstatic", "--noinput"]
          envFrom:
            - configMapRef:
                name: mefit-production-env
            - secretRef:
                name: mefit-production-secret
