apiVersion: apps/v1
kind: Deployment
metadata:
  name: mefit-production-store-resume-worker
  namespace: mefit-backend-production
  labels:
    app: mefit-production-store-resume-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mefit-production-store-resume-worker
  template:
    metadata:
      labels:
        app: mefit-production-store-resume-worker
    spec:
      imagePullSecrets:
        - name: mefit-production-dockerhub
      containers:
        - name: store-resume-worker
          image: teammefit/mefit-store-resume:production
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: mefit-production-store-resume-env
            - secretRef:
                name: mefit-production-store-resume-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
