name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: false

      - name: Type check (tsc -b)
        run: bunx --bun tsc -b --noEmit
        continue-on-error: false

      - name: Unit tests (Jest)
        run: bun run test -- --ci --runInBand
        env:
          CI: true

      - name: Unit tests with coverage (informational)
        if: always()
        run: bun run test:coverage -- --ci --runInBand
        continue-on-error: true
        env:
          CI: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # E2E (Playwright) — optional, runs only when @playwright/test is installed locally.
  # 활성화하려면:
  #   1) bun add -d @playwright/test
  #   2) bunx playwright install chromium
  #   3) 본 job 의 'if' 조건을 'true' 로 바꾸거나 PR label 등으로 게이트
  # tests-e2e/README.md 참조.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: false # 기본 비활성 — @playwright/test 설치 후 true 로 변경
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build frontend (for preview server)
        run: bun run build

      - name: Run E2E tests (Playwright)
        run: bun run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
