name: Deploy GitHub Page

on:
  push:
    branches:
      - master
    paths:
      - "github-page/**"
      - ".github/workflows/deploy-github-page.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-page-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Publish to github-page branch
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-page

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Type check
        run: bunx tsc -b --pretty false

      - name: Build
        env:
          VITE_BASE_PATH: /2026-capstone-54/
        run: bun run build

      - name: Add SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Publish to github-page branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github-page/dist
          publish_branch: github-page
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: build from ${{ github.sha }}"
