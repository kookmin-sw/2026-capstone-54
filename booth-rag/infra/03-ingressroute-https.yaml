apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: booth-rag-ingress
  namespace: booth-rag
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`question.mefit.kr`) && PathPrefix(`/api/`)
      kind: Rule
      priority: 110
      services:
        - name: booth-rag
          port: 80
    - match: Host(`question.mefit.kr`)
      kind: Rule
      services:
        - name: booth-rag
          port: 80
  tls:
    secretName: booth-rag-certificate
