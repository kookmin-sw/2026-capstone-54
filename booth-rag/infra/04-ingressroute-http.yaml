apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: booth-rag-ingress-http
  namespace: booth-rag
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`question.mefit.kr`) && PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      services:
        - name: booth-rag
          port: 80
    - match: Host(`question.mefit.kr`) && PathPrefix(`/api/`)
      kind: Rule
      priority: 110
      services:
        - name: booth-rag
          port: 80
      middlewares:
        - name: booth-rag-redirect-to-https
    - match: Host(`question.mefit.kr`)
      kind: Rule
      services:
        - name: booth-rag
          port: 80
      middlewares:
        - name: booth-rag-redirect-to-https
