apiVersion: v1
kind: Service
metadata:
  name: booth-rag
  namespace: booth-rag
  labels:
    app: booth-rag
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8765
---
apiVersion: v1
kind: Endpoints
metadata:
  name: booth-rag
  namespace: booth-rag
  labels:
    app: booth-rag
subsets:
  - addresses:
      - ip: 192.168.0.100
    ports:
      - name: http
        port: 8765
        protocol: TCP
