services:
  webapp:
    build:
      context: .
      dockerfile: ./environments/development/Dockerfile
    command: python manage.py runserver 0.0.0.0:${PORT}
    ports:
      - ${PORT}:${PORT}
    volumes:
      - ./webapp:/app/webapp
      - ./environments/development/entrypoint.sh:/app/entrypoint.sh
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      test_postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./environments/development/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  test_postgres:
    image: postgres:18.3
    ports:
      - ${TEST_POSTGRES_PORT}:5432
    volumes:
      - test_postgres_data:/var/lib/postgresql
      - ./environments/development/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_DB: ${TEST_DATABASE_NAME}
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER} -d ${TEST_DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  test_postgres_data:
