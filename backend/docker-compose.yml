x-celery-base: &celery-base
  build:
    context: .
    dockerfile: ./environments/development/Dockerfile
  restart: always
  env_file:
    - .env
  environment:
    - DJANGO_SETTINGS_MODULE=config.settings.development
  volumes:
    - ./webapp:/app/webapp
    - ./environments/development/entrypoint.sh:/app/entrypoint.sh
  entrypoint: []

x-postgres-base: &postgres-base
  image: teammefit/mefit-postgres-dev:latest
  healthcheck:
    interval: 10s
    timeout: 5s
    retries: 5

services:
  webapp:
    build:
      context: .
      dockerfile: ./environments/development/Dockerfile
    command: uvicorn config.asgi:application --host 0.0.0.0 --port ${PORT} --reload
    ports:
      - ${PORT}:${PORT}
    volumes:
      - ./webapp:/app/webapp
      - ./environments/development/entrypoint.sh:/app/entrypoint.sh
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      flower:
        condition: service_started
    networks:
      - default
      - mefit-local

  postgres:
    <<: *postgres-base
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./environments/development/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DATABASE_NAME}"]
    networks:
      - default
      - mefit-local

  redis:
    image: redis:8
    container_name: mefit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
      - mefit-local

  celery-worker:
    <<: *celery-base
    container_name: mefit-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l INFO -E

  celery-beat:
    <<: *celery-base
    container_name: mefit-celery-beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l INFO

  s3mock:
    image: adobe/s3mock:latest
    container_name: mefit-s3mock
    environment:
      - COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS=${AWS_STORAGE_BUCKET_NAME:-mefit-files}
      - COM_ADOBE_TESTING_S3MOCK_STORE_ROOT=containers3root
      - COM_ADOBE_TESTING_S3MOCK_STORE_RETAIN_FILES_ON_EXIT=true
      - debug=false
    ports:
      - "9090:9090"   # HTTP (boto3 endpoint_url 용)
    volumes:
      - s3mock_data:/containers3root
    networks:
      - default
      - mefit-local

  flower:
    image: mher/flower:2.0
    container_name: mefit-flower
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - FLOWER_UNAUTHENTICATED_API=true
    command: >
      celery --broker=redis://redis:6379/0
      flower
      --port=5555
      --url-prefix=admin/flower
    ports:
      - "5555:5555"
    restart: always
    networks:
      - default
      - mefit-local

volumes:
  postgres_data:
  s3mock_data:

networks:
  mefit-local:
    external: true
