name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그 (예: production, <commit sha>)"
        required: true
        default: "production"
      target:
        description: "배포 타겟"
        required: true
        type: choice
        default: all
        options:
          - all
          - api
          - celery-worker
          - celery-beat

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Secret 주입 및 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            NS="mefit-backend-production"

            # infra 레포 최신화
            echo "▶ infra 레포 최신화 중..."
            git -C ~/infra pull

            # namespace 생성 (없으면)
            kubectl create namespace "${NS}" --dry-run=client -o yaml | kubectl apply -f -

            # Docker Hub imagePullSecret 주입
            kubectl create secret docker-registry mefit-production-dockerhub \
              --docker-server=https://index.docker.io/v1/ \
              --docker-username="${{ secrets.DOCKERHUB_USERNAME }}" \
              --docker-password="${{ secrets.DOCKERHUB_TOKEN }}" \
              -n "${NS}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # Secret 주입
            kubectl create secret generic mefit-production-secret \
              --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              --from-literal=DEBUG="${{ secrets.DEBUG }}" \
              --from-literal=ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              --from-literal=PORT="${{ secrets.PORT }}" \
              --from-literal=BASE_URL="${{ secrets.BASE_URL }}" \
              --from-literal=DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
              --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
              --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
              --from-literal=POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}" \
              --from-literal=POSTGRES_PORT="${{ secrets.POSTGRES_PORT }}" \
              --from-literal=EMAIL_BACKEND="${{ secrets.EMAIL_BACKEND }}" \
              --from-literal=EMAIL_HOST="${{ secrets.EMAIL_HOST }}" \
              --from-literal=EMAIL_PORT="${{ secrets.EMAIL_PORT }}" \
              --from-literal=EMAIL_USE_TLS="${{ secrets.EMAIL_USE_TLS }}" \
              --from-literal=EMAIL_HOST_USER="${{ secrets.EMAIL_HOST_USER }}" \
              --from-literal=EMAIL_HOST_PASSWORD="${{ secrets.EMAIL_HOST_PASSWORD }}" \
              --from-literal=DEFAULT_FROM_EMAIL="${{ secrets.DEFAULT_FROM_EMAIL }}" \
              -n "${NS}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # 배포 실행 (migrate → rollout → collectstatic 순서로 자동 처리)
            chmod +x ~/infra/scripts/deploy.sh
            ~/infra/scripts/deploy.sh \
              "${{ inputs.image_tag }}" \
              "${{ inputs.target }}"

      - name: 배포 결과 요약
        if: always()
        run: |
          echo "### 🚀 배포 결과" >> "$GITHUB_STEP_SUMMARY"
          echo "- **이미지:** teammefit/mefit-backend:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **타겟:** ${{ inputs.target }}" >> "$GITHUB_STEP_SUMMARY"
