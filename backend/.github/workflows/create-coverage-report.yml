name: Create Coverage Report

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

env:
  SECRET_KEY: ${{ secrets.CI_DJANGO_KEY }}
  DEBUG: "True"
  ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
  PORT: 8000
  DJANGO_SETTINGS_MODULE: config.settings.test
  POSTGRES_PORT: 5432
  DATABASE_NAME: test_db
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
  POSTGRES_HOST: localhost

jobs:
  generate-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build custom PostgreSQL image
        run: docker build -t custom-postgres -f environments/development/Dockerfile.postgres environments/development/

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_DB=${{ env.DATABASE_NAME }} \
            -e POSTGRES_USER=${{ env.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.CI_POSTGRES_PASSWORD }} \
            -v ${{ github.workspace }}/environments/development/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh \
            -p 5432:5432 \
            custom-postgres

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies via uv
        run: |
          uv sync --frozen --group test

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 5
          done

      - name: Run Django migrations
        working-directory: webapp
        run: uv run python manage.py migrate

      - name: Generate test coverage report
        working-directory: webapp
        run: |
          uv run coverage run --source='.' manage.py test --keepdb || true
          uv run coverage report
          uv run coverage html

      - name: Commit and push coverage report to coverage-docs branch
        if: github.event.deleted != true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"

          # Fetch existing coverage-docs branch if it exists
          git fetch origin coverage-docs:coverage-docs 2>/dev/null || true

          # Create orphan branch locally (does not affect remote yet)
          git checkout --orphan coverage-docs-new

          # Stage only the htmlcov output
          git rm -rf . 2>/dev/null || true

          # Create branch-specific directory
          BRANCH_DIR="coverage/${{ github.ref_name }}"
          mkdir -p "$BRANCH_DIR"
          cp -r webapp/htmlcov/* "$BRANCH_DIR/"

          # Generate index.html with branch links
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Coverage Reports</title>
            <style>
              body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
              h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
              .branch-list { list-style: none; padding: 0; }
              .branch-list li { margin: 15px 0; }
              .branch-list a { font-size: 18px; color: #0366d6; text-decoration: none; }
              .branch-list a:hover { text-decoration: underline; }
              .timestamp { color: #666; font-size: 14px; }
            </style>
          </head>
          <body>
            <h1>Coverage Reports</h1>
            <p class="timestamp">Last updated: TIMESTAMP</p>
            <ul class="branch-list">
          EOF

          # Add links to all existing branch directories
          for dir in coverage/*/; do
            branch=$(basename "$dir")
            echo "              <li><a href="$branch/index.html">$branch</a></li>" >> index.html
          done

          cat >> index.html << 'EOF'
            </ul>
          </body>
          </html>
          EOF

          # Replace timestamp
          sed -i "s/TIMESTAMP/$(date '+%Y-%m-%d %H:%M:%S')/" index.html

          # Clean up unwanted files
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

          git add .

          if git diff --cached --quiet; then
            echo "✅ No changes in coverage report. Skipping commit & push."
            exit 0
          fi

          git commit -m "Coverage Report - ${{ github.ref_name }} - $(date '+%Y-%m-%d %H:%M:%S')"

          # Force push to coverage-docs without deleting the branch first
          # This preserves the GitHub Pages branch association
          git push origin coverage-docs-new:coverage-docs --force
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Delete coverage report for deleted branch
        if: github.event.deleted == true
        run: |
          DELETED_BRANCH="${{ github.event.ref }}"
          echo "Deleting coverage report for branch: $DELETED_BRANCH"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"

          git fetch origin coverage-docs:coverage-docs 2>/dev/null || true
          git checkout coverage-docs

          if [ -d "coverage/$DELETED_BRANCH" ]; then
            rm -rf "coverage/$DELETED_BRANCH"
            git add -A
            git commit -m "Remove coverage report for deleted branch: $DELETED_BRANCH"
            git push origin coverage-docs
            echo "✅ Deleted coverage/$DELETED_BRANCH"
          else
            echo "No coverage report found for branch: $DELETED_BRANCH"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Post coverage report link
        if: github.event.deleted != true
        run: |
          REPO_NAME="${{ github.repository }}"
          PAGES_URL="https://${REPO_NAME#*/}.github.io/$REPO_NAME"
          BRANCH_REPORT_URL="${PAGES_URL}/coverage/${{ github.ref_name }}/index.html"

          echo "coverage_url=$BRANCH_REPORT_URL" >> $GITHUB_OUTPUT

          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "📊 $BRANCH_REPORT_URL" >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
