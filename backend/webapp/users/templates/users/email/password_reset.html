<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정</title>
</head>
<body style="margin:0; padding:0; background-color:#F3F4F6; font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F3F4F6; padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="background-color:#FFFFFF; border-radius:8px; border:1px solid #E7E5E4; overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#F97316; padding:32px 40px; text-align:center;">
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td style="color:#FFFFFF; font-size:18px; font-weight:700; font-family:'Inter', sans-serif;">
                    &#x25B6; MeFit
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px; text-align:center;">
              <!-- Lock Icon -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
                <tr>
                  <td style="background-color:#FED7AA; border-radius:32px; width:64px; height:64px; text-align:center; vertical-align:middle; font-size:28px;">
                    &#x1F512;
                  </td>
                </tr>
              </table>
              <!-- Title -->
              <h1 style="margin:0 0 24px; color:#1C1917; font-size:22px; font-weight:700; font-family:'Inter', sans-serif;">
                비밀번호 재설정
              </h1>
              <!-- Description -->
              <p style="margin:0 0 24px; color:#78716C; font-size:14px; line-height:1.7; font-family:'Inter', sans-serif;">
                안녕하세요!<br>
                {{ user_email }}로 요청하신 비밀번호 재설정 안내입니다.<br>
                아래 버튼을 클릭하여 새 비밀번호를 설정해 주세요.
              </p>
              <!-- Divider -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                <tr><td style="border-top:1px solid #E7E5E4;"></td></tr>
              </table>
              <!-- Reset Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 12px;">
                <tr>
                  <td style="border-radius:8px; background-color:#F97316; text-align:center;">
                    <a href="{{ reset_url }}" target="_blank" style="display:inline-block; padding:16px 48px; color:#FFFFFF; font-size:16px; font-weight:700; font-family:'Inter', sans-serif; text-decoration:none;">
                      비밀번호 재설정하기
                    </a>
                  </td>
                </tr>
              </table>
              <!-- Expiry Note -->
              <p style="margin:0 0 24px; color:#A8A29E; font-size:12px; font-family:'Inter', sans-serif;">
                &#x23F0; 이 링크는 30분간 유효합니다
              </p>
              <!-- Divider -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                <tr><td style="border-top:1px solid #E7E5E4;"></td></tr>
              </table>
              <!-- Security Note -->
              <p style="margin:0; color:#A8A29E; font-size:12px; font-family:'Inter', sans-serif;">
                본인이 요청하지 않으셨다면 이 이메일을 무시하셔도 됩니다.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#FFF7ED; padding:20px 40px; text-align:center;">
              <p style="margin:0 0 6px; color:#A8A29E; font-size:11px; font-family:'Inter', sans-serif;">
                본 이메일은 MeFit 비밀번호 재설정 요청 시 자동 발송됩니다.
              </p>
              <p style="margin:0; color:#A8A29E; font-size:11px; font-family:'Inter', sans-serif;">
                비밀번호 재설정을 요청하지 않으셨다면 이 이메일을 무시하셔도 됩니다.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
